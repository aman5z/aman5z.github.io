  --cert-heading: #e0e4f0;
  --cert-sub: #6b7394;
  --section-tag-iot-bg: rgba(0,229,160,0.1);
  --section-tag-iot-c: #00e5a0;

  --section-tag-cyber-bg: rgba(255,107,53,0.1);
  --section-tag-cyber-c: #ff6b35;
  --section-tag-cyber-border: rgba(255,107,53,0.3);
  --section-tag-infra-bg: rgba(0,170,255,0.1);
  --section-tag-infra-c: #00aaff;
  --section-tag-infra-border: rgba(0,170,255,0.3);
  --section-tag-elec-bg: rgba(199,125,255,0.1);
  --section-tag-elec-c: #c77dff;
  --section-tag-elec-border: rgba(199,125,255,0.3);
  --section-tag-web-bg: rgba(255,209,102,0.1);
  --section-tag-web-c: #ffd166;
  --section-tag-web-border: rgba(255,209,102,0.3);
  --badge-diy-bg: rgba(0,229,160,0.08);
  --badge-diy-c: #00e5a0;
  --badge-diy-border: rgba(0,229,160,0.2);

  --badge-research-bg: rgba(255,107,53,0.08);
  --badge-research-c: #ff6b35;
  --badge-research-border: rgba(255,107,53,0.2);
  --card-link-bg: rgba(0,229,160,0.06);
  --card-link-c: #00e5a0;

  --part-dot: #00e5a0;
  --conn-key-c: #00e5a0;
  --scenario-border: #00e5a0;
  --feature-arrow: #00e5a0;
  --toggle-bg: #1a1e28;
  --toggle-border: #252a38;
  --toggle-c: #e0e4f0;
  --philosophy-bg: linear-gradient(135deg, #1a1e28 0%, #0c0e12 100%);
  --philosophy-text: #e0e4f0;
  --philosophy-border: rgba(0,229,160,0.2);
  --why-card-border: rgba(0,229,160,0.15);
  --btn-a-bg: #00e5a0;
  --btn-a-c: #0c0e12;
  --btn-b-bg: transparent;
  --btn-b-c: #00e5a0;
  --btn-b-border: #00e5a0;
  --hero-badge-bg: rgba(0,229,160,0.1);
  --hero-badge-border: rgba(0,229,160,0.3);
  --hero-badge-c: #00e5a0;
  --expertise-card-border: rgba(0,229,160,0.2);
  --expertise-h4-c: #00e5a0;
  --expertise-check: #00e5a0;
  --cat-pill-iot-border: #00e5a0; --cat-pill-iot-c: #00e5a0;
  --cat-pill-cyber-border: #ff6b35; --cat-pill-cyber-c: #ff6b35;
  --cat-pill-infra-border: #00aaff; --cat-pill-infra-c: #00aaff;

  --cat-pill-elec-border: #c77dff; --cat-pill-elec-c: #c77dff;
  --cat-pill-web-border: #ffd166; --cat-pill-web-c: #ffd166;
  --section-title-c: #ffffff;
  --section-desc-c: #6b7394;
  --section-index-c: #6b7394;
}

[data-theme="light"] {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface2: #f0f4ff;
  --border: #e0e0e0;
  --accent: #003ee6;
  --accent2: #121158;
  --accent3: #e04f25;
  --accent-purple: #7c3aed;
  --accent-yellow: #b45309;
  --text: #333333;
  --text2: #555555;
  --muted: #888888;
  --heading: #121158;
  --font-body: 'Poppins', 'Segoe UI', sans-serif;
  --font-mono: 'Courier New', monospace;
  --hero-bg: linear-gradient(135deg, #003ee6 0%, #121158 100%);
  --hero-text: #ffffff;
  --hero-muted: rgba(255,255,255,0.75);
  --hero-border: rgba(255,255,255,0.2);
  --stat-bg: linear-gradient(135deg, #003ee6 0%, #121158 100%);
  --stat-text: #ffffff;
  --stat-label: rgba(255,255,255,0.8);
  --skill-tag-bg: #e0e7ff;
  --skill-tag-color: #003ee6;
  --skill-tag-border: #c7d2fe;
  --timeline-color: #003ee6;
  --cert-border: #003ee6;
  --cert-bg: #f0f4ff;
  --cert-heading: #121158;
  --cert-sub: #666;
  --section-tag-iot-bg: #e0f7f1; --section-tag-iot-c: #065f46; --section-tag-iot-border: #6ee7b7;
  --section-tag-cyber-bg: #fff1ec; --section-tag-cyber-c: #9a3412; --section-tag-cyber-border: #fed7aa;
  --section-tag-infra-bg: #eff6ff; --section-tag-infra-c: #1e40af; --section-tag-infra-border: #bfdbfe;
  --section-tag-elec-bg: #f5f3ff; --section-tag-elec-c: #5b21b6; --section-tag-elec-border: #ddd6fe;
  --section-tag-web-bg: #fffbeb; --section-tag-web-c: #92400e; --section-tag-web-border: #fde68a;
  --badge-diy-bg: #e0f7f1; --badge-diy-c: #065f46; --badge-diy-border: #6ee7b7;
  --badge-freelance-bg: #eff6ff; --badge-freelance-c: #1e40af; --badge-freelance-border: #bfdbfe;
  --badge-research-bg: #fff1ec; --badge-research-c: #9a3412; --badge-research-border: #fed7aa;
  --card-link-bg: #eff6ff; --card-link-c: #1e40af; --card-link-border: #93c5fd;
  --card-link-hover-bg: #dbeafe;
  --part-dot: #003ee6;
  --conn-key-c: #003ee6;
  --scenario-border: #003ee6;
  --feature-arrow: #003ee6;
  --toggle-bg: #ffffff; --toggle-border: #d1d5db; --toggle-c: #121158;
  --philosophy-bg: linear-gradient(135deg, #003ee6 0%, #121158 100%);
  --philosophy-text: #ffffff;
  --philosophy-border: rgba(255,255,255,0.3);
  --why-card-border: #003ee6;
  --btn-a-bg: #003ee6; --btn-a-c: #ffffff;
  --btn-b-bg: transparent; --btn-b-c: #003ee6; --btn-b-border: #003ee6;
  --hero-badge-bg: rgba(255,255,255,0.15); --hero-badge-border: rgba(255,255,255,0.3); --hero-badge-c: #ffffff;
  --expertise-card-border: #003ee6; --expertise-h4-c: #003ee6; --expertise-check: #003ee6;
  --cat-pill-iot-border: #059669; --cat-pill-iot-c: #065f46;
  --cat-pill-cyber-border: #dc2626; --cat-pill-cyber-c: #991b1b;
  --cat-pill-infra-border: #2563eb; --cat-pill-infra-c: #1e40af;
  --cat-pill-elec-border: #7c3aed; --cat-pill-elec-c: #5b21b6;
  --cat-pill-web-border: #b45309; --cat-pill-web-c: #92400e;
  --section-title-c: #121158;
  --section-desc-c: #555;
  --section-index-c: #888;
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ══════════════════════════════════════════
   THEME TOGGLE
══════════════════════════════════════════ */
#theme-toggle {
  position: fixed;
  top: 20px;
  right: 24px;
  z-index: 9000;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  border-radius: 40px;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  color: var(--toggle-c);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: all 0.25s;
  white-space: nowrap;
  user-select: none;
}
#theme-toggle:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
.toggle-icon { font-size: 14px; transition: transform 0.4s; }
#theme-toggle:hover .toggle-icon { transform: rotate(20deg); }

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.hero {
  background: var(--hero-bg);
  padding: 90px 40px 70px;
  border-bottom: 1px solid var(--hero-border);
  transition: background 0.3s;
}
.hero-inner { max-width: 1100px; margin: 0 auto; }

[data-theme="dark"] .hero-inner { text-align: left; }
[data-theme="dark"] .hero-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}
[data-theme="dark"] .hero h1 {
  font-family: var(--font-mono);
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 12px;
}
[data-theme="dark"] .hero-subtitle {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}
[data-theme="dark"] .hero-tagline { color: var(--muted); max-width: 640px; font-size: 14px; }
[data-theme="dark"] .hero-badges { justify-content: flex-start; }
[data-theme="dark"] .hero-contact { justify-content: flex-start; }

[data-theme="light"] .hero-inner { text-align: center; }
[data-theme="light"] .hero-label {
  font-family: var(--font-body);
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--hero-muted);
  margin-bottom: 8px;
}
[data-theme="light"] .hero h1 {
  font-family: var(--font-body);
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 10px;
}
[data-theme="light"] .hero-subtitle {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  margin-bottom: 16px;
}
[data-theme="light"] .hero-tagline {
  color: rgba(255,255,255,0.75);
  max-width: 720px;
  margin: 0 auto 10px;
  font-size: 15px;
}
[data-theme="light"] .hero-badges { justify-content: center; }
[data-theme="light"] .hero-contact { justify-content: center; }

.hero-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 28px;
}
.hero-badge {
  background: var(--hero-badge-bg);
  border: 1px solid var(--hero-badge-border);
  color: var(--hero-badge-c);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
[data-theme="light"] .hero-badge { font-family: var(--font-body); font-weight: 500; }

.hero-contact {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
}
.btn {
  padding: 10px 24px;
  border-radius: 40px;
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  font-family: var(--font-body);
  display: inline-block;
  transition: all 0.25s;
  cursor: pointer;
  border: none;
}
.btn-a { background: var(--btn-a-bg); color: var(--btn-a-c); }
.btn-b { background: var(--btn-b-bg); color: var(--btn-b-c); border: 2px solid var(--btn-b-border); }
.btn:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(0,0,0,0.2); }
[data-theme="dark"] .btn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; }

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
.stats-section {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 40px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 20px;
}
.stat-card {
  background: var(--stat-bg);
  border-radius: 10px;
  padding: 28px 24px;
  text-align: center;
  position: relative;
  cursor: help;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-3px); }
.stat-card .number {
  display: block;
  font-family: var(--font-mono);
  font-size: 2.6em;
  font-weight: 700;
  color: var(--stat-text);
  margin-bottom: 8px;
}
.stat-card .label { font-size: 13px; color: var(--stat-label); }
[data-theme="light"] .stat-card .number { font-family: 'Poppins', sans-serif; }

[data-tooltip] { position: relative; }
[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 14px;
  background: rgba(0,0,0,0.92);
  color: #fff;
  border-radius: 6px;
  white-space: pre-line;
  font-size: 12px;
  line-height: 1.5;
  z-index: 1000;
  min-width: 210px;
  text-align: left;
  font-family: var(--font-body);
  font-weight: 400;
  pointer-events: none;
}

/* ══════════════════════════════════════════
   SHARED SECTION WRAPPER
══════════════════════════════════════════ */
.bio-section {
  max-width: 1100px;
  margin: 0 auto 30px;
  padding: 40px;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  transition: background 0.3s, border 0.3s;
}
[data-theme="dark"] .bio-section { box-shadow: none; }
[data-theme="light"] .bio-section { box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid #e8e8e8; }

.bio-section-wrap { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

.section-h2 {
  font-family: var(--font-mono);
  font-size: 1.5em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}
[data-theme="light"] .section-h2 {
  font-family: 'Poppins', sans-serif;
  font-size: 1.8em;
  color: #003ee6;
  border-bottom-color: #003ee6;
  display: block;
}

.about-text {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text2);
  margin-bottom: 14px;
}
.about-text strong { color: var(--text); }
[data-theme="light"] .about-text { color: #555; }
[data-theme="light"] .about-text strong { color: #121158; }

/* ══════════════════════════════════════════
   EXPERTISE GRID
══════════════════════════════════════════ */
.expertise-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 20px;
  margin-top: 24px;
}
.expertise-card {
  background: var(--surface2);
  padding: 24px;
  border-radius: 8px;
  border-left: 4px solid var(--expertise-card-border);
  transition: background 0.3s;
}
.expertise-card h4 {
  color: var(--expertise-h4-c);
  font-size: 1.1em;
  font-family: var(--font-mono);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
[data-theme="light"] .expertise-card h4 { font-family: 'Poppins', sans-serif; font-size: 1.15em; }
.expertise-card ul { list-style: none; }
.expertise-card li {
  padding: 4px 0 4px 22px;
  color: var(--text2);
  font-size: 13px;
  position: relative;
}
.expertise-card li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: var(--expertise-check);
  font-weight: bold;
}
[data-theme="light"] .expertise-card li::before { content: "✓ "; }

/* ══════════════════════════════════════════
   SKILLS TAGS
══════════════════════════════════════════ */
.skills-group { margin-top: 20px; }
.skills-group h3 {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 20px;
}
[data-theme="light"] .skills-group h3 { font-family: 'Poppins', sans-serif; font-size: 14px; color: #121158; letter-spacing: 0; font-weight: 600; }
.skills-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag {
  background: var(--skill-tag-bg);
  color: var(--skill-tag-color);
  border: 1px solid var(--skill-tag-border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
  transition: background 0.2s;
}
[data-theme="light"] .skill-tag { font-family: 'Poppins', sans-serif; font-weight: 500; border: none; }

/* ══════════════════════════════════════════
   CATEGORY NAV (Projects)
══════════════════════════════════════════ */
.projects-header {
  max-width: 1100px;
  margin: 50px auto 0;
  padding: 0 40px 24px;
  border-bottom: 1px solid var(--border);
}
.projects-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
}
[data-theme="light"] .projects-label { color: var(--accent); }
.projects-title {
  font-family: var(--font-mono);
  font-size: clamp(22px, 3.5vw, 36px);
  font-weight: 700;
  color: var(--section-title-c);
  margin-bottom: 8px;
}
[data-theme="light"] .projects-title { font-family: 'Poppins', sans-serif; }
.projects-desc { color: var(--section-desc-c); font-size: 14px; max-width: 580px; }

.cat-nav {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 40px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.cat-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 6px 14px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-decoration: none;
  transition: all 0.2s;
}
.cat-pill:hover { opacity: 0.8; }
.cat-pill.iot { border-color: var(--cat-pill-iot-border); color: var(--cat-pill-iot-c); }
.cat-pill.cyber { border-color: var(--cat-pill-cyber-border); color: var(--cat-pill-cyber-c); }
.cat-pill.infra { border-color: var(--cat-pill-infra-border); color: var(--cat-pill-infra-c); }
.cat-pill.elec { border-color: var(--cat-pill-elec-border); color: var(--cat-pill-elec-c); }
.cat-pill.webapps { border-color: var(--cat-pill-web-border); color: var(--cat-pill-web-c); }
[data-theme="light"] .cat-pill { border-radius: 20px; font-family: 'Poppins', sans-serif; font-size: 12px; letter-spacing: 0; }

/* ══════════════════════════════════════════
   PROJECT SECTIONS
══════════════════════════════════════════ */
.proj-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 56px 40px 0;
  border-top: 1px solid var(--border);
  margin-top: 56px;
}
.proj-section:first-of-type { border-top: none; margin-top: 20px; }

.section-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 36px;
